{% if messages %}
    {% for message in messages %}
        <div class="container">
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">

                {% if message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
                    Important:
                {% endif %}

                {{ message }}

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="alert"
                        aria-label="Close">
                </button>

            </div>
        </div>
    {% endfor %}
{% endif %}



<style>
    .alert {
    position: relative;
}

.alert .close {
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
}
</style>
