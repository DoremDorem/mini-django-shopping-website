{% extends "base.html" %}
{% load static %}

{% block content %}

<style>

.login-area{
    padding:80px 0;
    background:#f8f9fa;
}

.login-box{

    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    animation:loginAnimation .6s ease;

}

@keyframes loginAnimation{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.login-header{

    background:var(--bs-primary);
    color:#fff;
    padding:35px;
    text-align:center;

}

.login-header i{

    font-size:55px;
    margin-bottom:15px;

}

.login-body{

    padding:35px;

}

.login-input{

    position:relative;
    margin-bottom:25px;

}

.login-input i{

    position:absolute;
    left:18px;
    top:18px;
    color:#888;

}

.login-input input{

    padding-left:50px;
    height:55px;
    border-radius:8px;

}

.login-input input:focus{

    border-color:var(--bs-primary);
    box-shadow:none;

}

.login-btn{

    width:100%;
    height:55px;
    border:none;
    border-radius:8px;
    background:var(--bs-primary);
    color:#fff;
    font-weight:600;
    transition:.3s;

}

.login-btn:hover{

    background:var(--bs-secondary);

}

.login-footer{

    text-align:center;
    margin-top:25px;

}

.login-footer a{

    color:var(--bs-primary);
    font-weight:600;
    text-decoration:none;

}



</style>

        <section class="login-area">

        <div class="container">

        <div class="login-box">

        <div class="login-header">

        <i class="fas fa-user-lock"></i>

        <p class="mb-0">
        send request for reset password
        </p>
        {% include 'includes/alert.html' %}

        </div>

        <div class="login-body">

        <form action="{% url 'forgot_password' %}" method="POST">

        {% csrf_token %}

        <div class="login-input">

        <i class="fas fa-envelope"></i>

        <input
        type="email"
        class="form-control"
        name="email"
        placeholder="Email Address"
        required>

        </div>
        <button type="submit" class="login-btn">

        <i class="fas fa-sign-in-alt me-2"></i>

        send Request

        </button>

        </form>

        </div>

        </div>

        </div>

        </section>
{% endblock %}
