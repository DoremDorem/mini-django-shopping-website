{% extends "base.html" %}
{% load static %}

{% block content %}

<style>

.login-area{
    padding:80px 0;
    background:#f8f9fa;
}

.login-box{

    max-width:500px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    animation:loginAnimation .6s ease;

}

@keyframes loginAnimation{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

.login-header{

    background:var(--bs-primary);
    color:#fff;
    padding:35px;
    text-align:center;

}

.login-header i{

    font-size:55px;
    margin-bottom:15px;

}

.login-body{

    padding:35px;

}

.login-input{

    position:relative;
    margin-bottom:25px;

}

.login-input i{

    position:absolute;
    left:18px;
    top:18px;
    color:#888;

}

.login-input input{

    padding-left:50px;
    height:55px;
    border-radius:8px;

}

.login-input input:focus{

    border-color:var(--bs-primary);
    box-shadow:none;

}

.login-btn{

    width:100%;
    height:55px;
    border:none;
    border-radius:8px;
    background:var(--bs-primary);
    color:#fff;
    font-weight:600;
    transition:.3s;

}

.login-btn:hover{

    background:var(--bs-secondary);

}

.login-footer{

    text-align:center;
    margin-top:25px;

}

.login-footer a{

    color:var(--bs-primary);
    font-weight:600;
    text-decoration:none;

}

.password-toggle{

    position:absolute;
    right:18px;
    top:18px;
    cursor:pointer;
    color:#888;

}

</style>

        <section class="login-area">

        <div class="container">

        <div class="login-box">

        <div class="login-header">

        <i class="fas fa-user-lock"></i>

        <h3>Welcome Reset Password Page</h3>

        <p class="mb-0">
        Reset Your Password
        </p>
        {% include 'includes/alert.html' %}

        </div>

        <div class="login-body">

        <form action="{% url 'reset_password' %}" method="POST">

        {% csrf_token %}

        <div class="login-input">

        <i class="fas fa-envelope"></i>

        <input
        type="password"
        class="form-control"
        name="password1"
        placeholder="Enter New Password"
        required>

        </div>

        <div class="login-input">

        <i class="fas fa-lock"></i>

        <input
        type="password"
        class="form-control"
        id="password"
        name="password2"
        placeholder="Enter confirm password"
        required>

        <span class="password-toggle"
        onclick="showPassword()">

        <i id="eye" class="fas fa-eye"></i>

        </span>

        </div>

        <div class="d-flex justify-content-between mb-4">

        </div>

        <button type="submit" class="login-btn">

        <i class="fas fa-sign-in-alt me-2"></i>

     Reset Password

        </button>

        </form>
        </div>

        </div>

        </div>

        </section>

<script>

function showPassword(){

let password=document.getElementById("password");
let eye=document.getElementById("eye");

if(password.type=="password"){

password.type="text";

eye.classList.replace("fa-eye","fa-eye-slash");

}
else{

password.type="password";

eye.classList.replace("fa-eye-slash","fa-eye");

}

}

</script>

{% endblock %}
